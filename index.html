<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unreal's sketchbook</title>
    <link rel="icon" type="image/png" href="https://itzmeunreal.neocities.org/images/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="content">
    <div class="navbar-items">
        <span class="navbar-page-text">unreal's homepage</span>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/home.png" width="16" height="16" class="label-icon-space">
                personal
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/home.png" width="14" height="14" class="label-icon-space">
                    home
                </a>
                <a href="/about.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/about.png" width="14" height="14" class="label-icon-space">
                    about
                </a>
                <a href="/works.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/home.png" width="14" height="14" class="label-icon-space">
                    works
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label label-primary">
                <img src="https://itzmeunreal.neocities.org/images/entertainment.png" width="16" height="16" class="label-icon-space">
                entertainment
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/music.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/entertainment.png" width="14" height="14" class="label-icon-space">
                    music player
                </a>
                <a href="/arcade.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/entertainment.png" width="14" height="14" class="label-icon-space">
                    arcade
                </a>
                <a href="/sketchbook.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/entertainment.png" width="14" height="14" class="label-icon-space">
                    sketch book
                </a>
            </div>
        </div>
        <div class="nav-dropdown">
            <button class="label">
                <img src="https://itzmeunreal.neocities.org/images/community.png" width="16" height="16" class="label-icon-space">
                community
                <span class="dropdown-arrow">&#9662;</span>
            </button>
            <div class="dropdown-menu">
                <a href="/forum.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/community.png" width="14" height="14" class="label-icon-space">
                    forum
                </a>
                <a href="/chat.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/community.png" width="14" height="14" class="label-icon-space">
                    chat room
                </a>
                <a href="/guestbook.html" class="dropdown-item">
                    <img src="https://itzmeunreal.neocities.org/images/community.png" width="14" height="14" class="label-icon-space">
                    guest book
                </a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="card" style="padding: 25px;">
            <p style="font-size: 20px; font-weight: bold; color: #fff; text-align: center; margin-bottom: 16px; letter-spacing: 1px;">sketch book</p>
            <div class="img-wrapper" style="width: 100%; height: calc(100vh - 220px);">
                <iframe src="https://jspaint.app" style="width:100%; height:100%; border:none; display:block;" allowfullscreen></iframe>
            </div>
            <p class="sketch-credits" style="margin-top: 12px; font-size: 11px; color: #444;">this is an external website created by <a href="https://github.com/1j01" target="_blank">isaiah odhner</a>, check out his github</p>
        </div>

        <div class="card" style="padding: 25px; margin-top: 30px;">
            <p class="section-title">send me your drawing!</p>
            <p style="text-align:center; font-size:13px; color:#888; margin-top:-10px; margin-bottom:20px;">save your creation and send it here :)</p>
            <form id="sketchForm" style="display:flex; flex-direction:column; gap:12px;">
                <input type="text" name="fi-sender-fullName" placeholder="your name or alias" required class="sketch-input">
                <input type="file" name="fi-file-drawing" accept="image/*" required class="sketch-input">
                <textarea name="fi-text-message" placeholder="say something about your drawing! (optional)" rows="3" class="sketch-input"></textarea>
                <button type="submit" class="label label-primary" style="align-self:center; cursor:pointer;">send it!</button>
            </form>
            <p id="formStatus" style="display:none; text-align:center; margin-top:12px; font-size:13px;"></p>
        </div>
    </div>
</div>
<script src="https://forminit.com/sdk/v1/forminit.js"></script>
<script src="script.js"></script>
</body>
</html>
